# Approve the dependency build scripts that genuinely need to run during
# install. pnpm 10 ignores build scripts by default and exits non-zero
# (ERR_PNPM_IGNORED_BUILDS) unless they're listed here — which was failing CI.
onlyBuiltDependencies:
  - contentlayer2
  - core-js
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
