name: Build and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@df199fb7be9f65074067a9eb93f12bb4c5547cf2 # v2.13.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Use npm to match the committed package-lock.json and Vercel's build.
      # (The repo has no pnpm-lock.yaml, so pnpm was the odd one out and kept
      # tripping over pnpm 10's build-script gating.)
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Dummy build-time values. The build instantiates Resend/Paddle at
          # module load (e.g. /api/support), so these must be non-empty or
          # `next build` throws during page-data collection. Real secrets live
          # in Vercel — CI never sends mail or processes payments.
          RESEND_API_KEY: "re_ci_dummy_key_not_real"
          RESEND_AUDIENCE_ID: "ci-dummy-audience"
          QUIZ_LEAD_NOTIFY_EMAIL: "ci@example.com"
          APPLE_TEAM_ID: "CIDUMMY0000"
          NEXT_PUBLIC_BUNDLE_IDENTIFIER: "com.rythma.ci"
          NEXT_PUBLIC_APP_REDIRECT_URL: "rythma://ci/redirect"
          NEXT_PUBLIC_PADDLE_ENV: "sandbox"
          NEXT_PUBLIC_PADDLE_CLIENT_TOKEN: "ci-dummy-token"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc
